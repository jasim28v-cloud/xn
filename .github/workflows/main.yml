name: Vista Prime Auto Update

on:
  schedule:
    - cron: '0 */2 * * *' # يعمل تلقائياً كل ساعتين
  workflow_dispatch: # يسمح لك بتشغيله يدوياً

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Run Scraper
        run: python your_script_name.py # استبدل 'your_script_name.py' باسم ملفك

      - name: Commit and Push changes
        run: |
          git config --global user.name "Vista-Prime-Bot"
          git config --global user.email "bot@vistaprime.com"
          git add index.html
          git commit -m "Update Vista Prime Feed: $(date)" || echo "No changes to commit"
          git push
